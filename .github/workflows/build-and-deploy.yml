name: Build & deploy map

# Builds the static parking map from the live Statens vegvesen register
# and deploys it to GitHub Pages.
#
# Schedule: every Sunday at 06:00 UTC (08:00 Europe/Oslo in summer, 07:00 in
# winter). Manual runs are also supported via the "Run workflow" button.
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/parking_app/**"
      - "scripts/make_icons.py"
      - "web/static/**"
      - ".github/workflows/build-and-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel in-progress
# scheduled runs — let them finish so we don't ship a half-built site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (offline only)
        run: pytest -q

      - name: Ingest list (Oslo facilities)
        run: parking-ingest-register

      - name: Enrich with per-facility detail
        # Cache disabled in CI — we always want fresh capacity numbers.
        run: parking-ingest-register-details --sleep 0.1

      - name: Generate PWA icons
        run: python scripts/make_icons.py

      - name: Build map into web/dist/
        run: parking-build-map --output web/dist/index.html --static-dir web/static

      - name: Add .nojekyll so Pages serves files as-is
        run: touch web/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
